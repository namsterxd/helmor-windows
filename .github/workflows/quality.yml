name: Quality

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CI: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      lint: ${{ steps.filter.outputs.lint }}
      typecheck: ${{ steps.filter.outputs.typecheck }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            lint:
              - '.github/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'biome.json'
              - 'tsconfig.json'
              - 'tsconfig.node.json'
              - 'vite.config.ts'
              - 'vitest.shims.d.ts'
              - 'components.json'
              - 'index.html'
              - '.storybook/**'
              - 'src/**'
              - 'sidecar/**'
              - 'src-tauri/**'
            typecheck:
              - '.github/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'tsconfig.node.json'
              - 'vite.config.ts'
              - 'vitest.shims.d.ts'
              - 'components.json'
              - 'index.html'
              - '.storybook/**'
              - 'src/**'
              - 'sidecar/**'
            rust:
              - '.github/**'
              - 'src-tauri/**'
              - 'sidecar/**'
              - 'package.json'
              - 'pnpm-lock.yaml'

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.lint == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Setup Rust Tauri
        uses: ./.github/actions/setup-rust-tauri

      - name: Build sidecar binary
        uses: ./.github/actions/build-sidecar

      - name: Run lint
        run: pnpm run lint

  typecheck:
    name: Typecheck
    needs: changes
    if: needs.changes.outputs.typecheck == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Run typecheck
        run: pnpm run typecheck

  # Windows dep-resolution + source-compile gate. Phase 1 unblocked Windows
  # dep resolution (Cargo.toml cfg(unix) fix); Phase 2 added cfg guards on
  # every Unix-only module (workspace/scripts.rs → stub, data_dir, sidecar
  # path, archive shell, system_commands per-OS, helpers::copy_symlink). The
  # gate is now STRICT — any Windows source-compile regression fails CI.
  rust-check-windows:
    name: Rust Windows Check
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Setup Rust Tauri
        uses: ./.github/actions/setup-rust-tauri

      - name: Build + stage sidecar (Windows)
        uses: ./.github/actions/build-sidecar
        with:
          target-triple: x86_64-pc-windows-msvc

      - name: cargo check for x86_64-pc-windows-msvc
        shell: bash
        working-directory: src-tauri
        run: cargo check --lib --target x86_64-pc-windows-msvc
