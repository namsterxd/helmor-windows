name: Test

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CI: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      sidecar: ${{ steps.filter.outputs.sidecar }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend:
              - '.github/**'
              - 'package.json'
              - 'bun.lock'
              - 'tsconfig.json'
              - 'tsconfig.node.json'
              - 'vite.config.ts'
              - 'vitest.shims.d.ts'
              - 'components.json'
              - 'index.html'
              - '.storybook/**'
              - 'public/**'
              - 'src/**'
            sidecar:
              - '.github/**'
              - 'package.json'
              - 'bun.lock'
              - 'sidecar/**'
              - 'tsconfig.json'
              - 'tsconfig.node.json'
            rust:
              - '.github/workflows/test.yml'
              - '.github/actions/setup-js/action.yml'
              - '.github/actions/setup-rust-tauri/action.yml'
              - '.github/actions/build-sidecar/action.yml'
              - 'package.json'
              - 'bun.lock'
              - 'src-tauri/**'
              - 'sidecar/**'

  frontend-test:
    name: Frontend Test
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Run frontend tests
        run: bun run test:frontend

  sidecar-test:
    name: Sidecar Test
    needs: changes
    if: needs.changes.outputs.sidecar == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Run sidecar tests
        run: bun run test:sidecar

  rust-test:
    name: Rust Test
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Setup Rust Tauri
        uses: ./.github/actions/setup-rust-tauri

      - name: Build sidecar binary
        uses: ./.github/actions/build-sidecar

      - name: Run Rust tests with nextest
        run: cd src-tauri && cargo nextest run

      - name: Run Rust doctests
        run: cd src-tauri && cargo test --doc
