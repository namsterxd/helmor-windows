name: Test

# Runs the three test suites (frontend vitest, sidecar bun test, rust cargo
# test). Uses dorny/paths-filter so each suite only runs when its own source
# tree changed; see the `filters` block in the `changes` job below.

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CI: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      sidecar: ${{ steps.filter.outputs.sidecar }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend:
              - '.github/**'
              - 'package.json'
              - 'bun.lock'
              - 'tsconfig.json'
              - 'tsconfig.node.json'
              - 'vite.config.ts'
              - 'vitest.shims.d.ts'
              - 'components.json'
              - 'index.html'
              - '.storybook/**'
              - 'public/**'
              - 'src/**'
            sidecar:
              - '.github/**'
              - 'package.json'
              - 'bun.lock'
              - 'sidecar/**'
              - 'tsconfig.json'
              - 'tsconfig.node.json'
            rust:
              - '.github/workflows/test.yml'
              - '.github/actions/setup-js/action.yml'
              - '.github/actions/setup-rust-tauri/action.yml'
              - '.github/actions/build-sidecar/action.yml'
              - 'package.json'
              - 'bun.lock'
              - 'src-tauri/**'
              - 'sidecar/**'

  frontend-test:
    name: Frontend Test
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Run frontend tests
        run: bun run test:frontend

  sidecar-test:
    # Matrix across all three supported OSes so bun-native / process.platform
    # branches (image-resize.ts, codex-app-server.ts, stage-vendor.ts) are
    # exercised on every runner where they might behave differently. Ubuntu
    # stays the default for gatekeeping; macOS and Windows add coverage.
    name: Sidecar Test (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.sidecar == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Run sidecar tests
        shell: bash
        run: bun run test:sidecar

  rust-test:
    # Matrix: exercise the integration tests on every target OS so the
    # #[cfg(target_os = ...)] branches added in Phase 2 (system_commands,
    # sidecar path, scripts stub, archive shell) actually run in CI.
    name: Rust Test (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target-triple: x86_64-unknown-linux-gnu
          - os: macos-latest
            target-triple: aarch64-apple-darwin
          - os: windows-latest
            target-triple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Setup Rust Tauri
        uses: ./.github/actions/setup-rust-tauri

      - name: Build sidecar binary
        uses: ./.github/actions/build-sidecar
        with:
          target-triple: ${{ matrix.target-triple }}

      # Unified for all three OSes. The Windows-specific DLL-copy branch was
      # a workaround for STATUS_ENTRYPOINT_NOT_FOUND (0xc0000139) that never
      # actually worked — the failing load is comctl32.dll v5 vs v6, not a
      # Tauri-side DLL. The real fix is embedding a Common-Controls v6
      # manifest for test binaries too, via src-tauri/build.rs +
      # windows-app-manifest.xml (see tauri-apps/tauri#13419).
      - name: Run Rust tests with nextest
        shell: bash
        run: cd src-tauri && cargo nextest run

      - name: Run Rust doctests
        shell: bash
        run: cd src-tauri && cargo test --doc
