name: Build

# macOS-only frontend + storybook build verification. Full Tauri Windows/
# Linux/macOS bundles are produced by publish.yml on tag push; this
# workflow just ensures the frontend still compiles under Vite.

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CI: true

jobs:
  app-build:
    name: App Build
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Run app build
        run: bun run build

  storybook-build:
    name: Storybook Build
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Run Storybook build
        run: bun run build-storybook
