name: Build

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CI: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      app_build: ${{ steps.filter.outputs.app_build }}
      storybook_build: ${{ steps.filter.outputs.storybook_build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            app_build:
              - '.github/**'
              - 'package.json'
              - 'bun.lock'
              - 'tsconfig.json'
              - 'tsconfig.node.json'
              - 'vite.config.ts'
              - 'vitest.shims.d.ts'
              - 'components.json'
              - 'index.html'
              - 'public/**'
              - 'src/**'
            storybook_build:
              - '.github/**'
              - 'package.json'
              - 'bun.lock'
              - 'tsconfig.json'
              - 'tsconfig.node.json'
              - 'vite.config.ts'
              - 'components.json'
              - 'index.html'
              - '.storybook/**'
              - 'public/**'
              - 'src/**'

  app-build:
    name: App Build
    needs: changes
    if: needs.changes.outputs.app_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Run app build
        run: bun run build

  storybook-build:
    name: Storybook Build
    needs: changes
    if: needs.changes.outputs.storybook_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Run Storybook build
        run: bun run build-storybook
